<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voylla: Advanced Search Marketing Strategy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Brand Colors (Dusty Rose & Warm Blush) */
            --brand-magenta: #b81d4b;
            --brand-gold: #c29b4e;
            --bg-color: #fff5f2;
            
            /* High Contrast Typography */
            --text-primary: #1e1e24;
            --text-secondary: rgba(30, 30, 36, 0.75);
            
            /* Light Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-highlight: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
            --blur-amount: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Soft Animated Background Orbs for Light Liquid Effect */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            background: #fff0ea;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            /* Removed heavy blur filter for performance */
            opacity: 0.6;
            animation: drift 25s infinite ease-in-out alternate;
            will-change: transform;
        }

        .orb-rose {
            background: radial-gradient(circle, #fcb6a4 0%, transparent 60%);
            width: 70vw;
            height: 70vw;
            top: -20vh;
            left: -10vw;
            animation-delay: 0s;
        }

        .orb-cream {
            background: radial-gradient(circle, #f5e4d7 0%, transparent 60%);
            width: 60vw;
            height: 60vw;
            bottom: -15vh;
            right: -10vw;
            animation-delay: -7s;
        }

        .orb-white {
            background: radial-gradient(circle, #ffffff 0%, transparent 70%);
            width: 80vw;
            height: 80vw;
            top: 30vh;
            left: 20vw;
            animation-delay: -15s;
            opacity: 0.8;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(3%, 5%) scale(1.05); }
            66% { transform: translate(-2%, 8%) scale(0.95); }
            100% { transform: translate(-4%, -2%) scale(1); }
        }

        /* Presentation Container */
        #presentation-container {
            width: 92vw;
            max-width: 1400px;
            height: 82vh;
            max-height: 900px;
            position: relative;
            perspective: 1200px;
        }

        /* Light Liquid Glass Slide Settings */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            -webkit-backdrop-filter: blur(var(--blur-amount)) saturate(180%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            border-left: 1px solid var(--glass-highlight);
            border-radius: 32px;
            box-shadow: var(--glass-shadow);
            padding: 4rem 5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0;
            visibility: hidden; /* Prevent 24 backdrop-filters rendering simultaneously */
            pointer-events: none;
            overflow-y: auto;
            transform: translateY(40px) scale(0.97);
            transition: opacity 0.7s cubic-bezier(0.19, 1, 0.22, 1), transform 0.7s cubic-bezier(0.19, 1, 0.22, 1), visibility 0.7s;
            will-change: transform, opacity;
        }
        
        /* Custom scrollbar for light theme */
        .slide::-webkit-scrollbar {
            width: 8px;
        }
        .slide::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02); 
            border-radius: 10px;
            margin: 20px 0;
        }
        .slide::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.15); 
            border-radius: 10px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        .slide::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.25); 
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        /* Staggered Content Animation classes */
        .slide.active .stagger-1 { animation: slideUpFade 0.7s forwards; animation-delay: 0.1s; opacity: 0; }
        .slide.active .stagger-2 { animation: slideUpFade 0.7s forwards; animation-delay: 0.2s; opacity: 0; }
        .slide.active .stagger-3 { animation: slideUpFade 0.7s forwards; animation-delay: 0.3s; opacity: 0; }
        .slide.active .stagger-4 { animation: slideUpFade 0.7s forwards; animation-delay: 0.4s; opacity: 0; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography & Layout */
        .slide-title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
            letter-spacing: -1.5px;
            line-height: 1.2;
        }

        .slide-subtitle {
            font-size: 1.6rem;
            font-weight: 500;
            color: var(--brand-magenta);
            margin-bottom: 2.5rem;
            letter-spacing: -0.5px;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Rich UI Components for Light Theme */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 4px 15px rgba(0,0,0,0.02);
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.4s ease;
        }

        .glass-panel:hover {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.7), 0 8px 25px rgba(212, 163, 149, 0.15);
            transform: translateY(-3px);
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .data-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.3) 100%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
        }

        .data-card:hover {
            background: rgba(255,255,255,0.7);
            border-color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 163, 149, 0.15);
        }

        .data-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--brand-magenta);
            border-radius: 4px 0 0 4px;
        }

        .data-card-gold::before { background: var(--brand-gold); }

        .data-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--brand-magenta);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .data-value {
            font-size: 1.15rem;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .metric-pill {
            display: inline-flex;
            align-items: center;
            background: rgba(212, 163, 149, 0.15);
            border: 1px solid rgba(212, 163, 149, 0.4);
            color: var(--brand-magenta);
            padding: 0.6rem 1.4rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }

        .highlight-text {
            color: var(--brand-magenta);
            font-weight: 600;
        }

        /* Styled Lists */
        ul.custom-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        ul.custom-list li {
            position: relative;
            padding-left: 2rem;
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        ul.custom-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.6rem;
            width: 8px;
            height: 8px;
            background: var(--brand-magenta);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(184, 29, 75, 0.3);
        }

        ul.custom-list li strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Floating Controls Bar (White Glass Theme) */
        #controls-bar {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top: 1px solid #ffffff;
            border-radius: 50px;
            padding: 0.5rem 1.25rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08), inset 0 0 20px rgba(255,255,255,0.6);
            z-index: 100;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .control-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0);
            transition: background 0.3s ease;
            z-index: -1;
        }

        .control-btn:hover::before {
            background: rgba(0, 0, 0, 0.05);
        }

        .control-btn:hover {
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: filter 0.3s;
        }

        .control-btn:hover svg {
            filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.2));
        }

        .slide-indicator {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
            min-width: 70px;
            text-align: center;
            padding: 0 0.5rem;
        }

        .control-divider {
            width: 1px; 
            height: 20px; 
            background: rgba(0,0,0,0.1); 
            margin: 0 0.2rem;
        }

        /* ----- Advanced CSS Structure Tree (Slide 3) ----- */
        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 2rem;
        }

        .tree-node {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(212, 163, 149, 0.2);
            padding: 1rem 2rem;
            border-radius: 12px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .tree-node-title {
            color: var(--brand-magenta);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
        }
        
        .tree-node-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .tree-root {
            margin-bottom: 3rem;
        }

        .tree-root::after {
            content: '';
            position: absolute;
            bottom: -3rem;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 3rem;
            background: var(--brand-gold);
            z-index: 1;
        }

        .tree-branches {
            display: flex;
            justify-content: center;
            gap: 2rem;
            position: relative;
            width: 100%;
        }

        .tree-branches::before {
            content: '';
            position: absolute;
            top: -2px;
            left: calc(16.6% + 2rem);
            right: calc(16.6% + 2rem);
            height: 2px;
            background: var(--brand-gold);
            z-index: 1;
        }

        .tree-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            position: relative;
        }

        .tree-branch::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 2rem;
            background: var(--brand-gold);
            z-index: 1;
        }

        .tree-branch .tree-node {
            margin-top: 2rem;
            width: 100%;
            max-width: 280px;
        }
        
        .tree-leaves {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 2rem;
            position: relative;
            width: 100%;
            align-items: center;
        }
        
        .tree-leaves::before {
            content: '';
            position: absolute;
            top: -2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: calc(100% + 2rem);
            background: rgba(194, 155, 78, 0.3); /* Lighter gold line */
            z-index: 1;
        }
        
        .tree-leaf {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-primary);
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 240px;
            text-align: center;
            font-weight: 500;
        }

        @media screen and (max-width: 1024px) {
            .slide { padding: 3rem; }
            .slide-title { font-size: 2.5rem; }
            .slide-subtitle { font-size: 1.3rem; }
            #presentation-container { width: 95vw; height: 88vh; }
        }
    </style>
</head>

        // --- JavaScript Single Page App Controller ---
        
        const container = document.getElementById('presentation-container');
        const indicator = document.getElementById('slide-indicator');
        let currentSlideIndex = 0;

        function initApp() {
            // Generate HTML for all 17 slides
            presentationData.forEach((slideData, index) => {
                const slideEl = document.createElement('div');
                slideEl.className = 'slide';
                slideEl.id = slideData.id;
                
                // Construct standard staggered header
                let html = `
                    <h2 class="slide-title stagger-1">${slideData.title}</h2>
                `;
                
                if (slideData.subtitle) {
                    html += `<h3 class="slide-subtitle stagger-2">${slideData.subtitle}</h3>`;
                }
                
                html += `<div class="content-wrapper">${slideData.content}</div>`;
                
                slideEl.innerHTML = html;
                container.appendChild(slideEl);
            });
            
            // Activate Slide 1
            renderSlide(currentSlideIndex);
        }

        function renderSlide(index) {
            const slides = document.querySelectorAll('.slide');
            if (index < 0 || index >= slides.length) return;
            
            // Remove active from all
            slides.forEach(s => s.classList.remove('active'));
            
            // Apply to target
            currentSlideIndex = index;
            slides[currentSlideIndex].classList.add('active');
            
            // Update UI State
            indicator.textContent = `${currentSlideIndex + 1} / ${presentationData.length}`;
        }

        // Navigation Actions
        function nextSlide() { renderSlide(currentSlideIndex + 1); }
        function prevSlide() { renderSlide(currentSlideIndex - 1); }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.log(`Fullscreen Error: ${err.message}`);
                });
            } else if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }

        // Event Binding
        document.getElementById('btn-next').addEventListener('click', nextSlide);
        document.getElementById('btn-prev').addEventListener('click', prevSlide);
        document.getElementById('btn-fullscreen').addEventListener('click', toggleFullScreen);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'f') toggleFullScreen();
        });

        // Boot
        initApp();
        
    </script>
